<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>deepRecall WebUI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #888;
            font-size: 1rem;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
        }
        .card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 24px;
        }
        .card h2 {
            font-size: 1.25rem;
            margin-bottom: 20px;
            color: #fff;
            font-weight: 600;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .stat-item {
            background: rgba(255, 255, 255, 0.02);
            padding: 16px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-label {
            font-size: 0.8rem;
            color: #888;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        input[type="text"], input[type="number"] {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px 16px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.2s;
        }
        input[type="text"]:focus, input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }
        button {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }
        button:active {
            transform: translateY(0);
        }
        button.secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        button.secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        button.danger {
            background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%);
        }
        .results {
            margin-top: 20px;
        }
        .result-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .result-id {
            font-family: monospace;
            font-size: 0.8rem;
            color: #667eea;
        }
        .result-meta {
            font-size: 0.75rem;
            color: #666;
        }
        .result-content {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #ccc;
            white-space: pre-wrap;
        }
        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .action-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .action-row input {
            max-width: 120px;
        }
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 0.9rem;
        }
        .message.success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
        }
        .message.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }
        .full-width {
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>deepRecall</h1>
            <p class="subtitle">High-Performance Group Chat RAG Memory System</p>
        </header>

        <div class="grid">
            <div class="card full-width">
                <h2>Search</h2>
                <div id="search-message"></div>
                <div class="search-box">
                    <input type="text" id="search-query" placeholder="Enter your query...">
                    <button id="search-btn">Search</button>
                </div>
                <div class="results" id="search-results"></div>
            </div>

            <div class="card">
                <h2>Stats</h2>
                <div class="stats-grid" id="stats-container">
                    <div class="stat-item">
                        <div class="stat-value" id="total-docs">-</div>
                        <div class="stat-label">Total Docs</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="total-groups">-</div>
                        <div class="stat-label">Groups</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="faiss-size">-</div>
                        <div class="stat-label">FAISS Index</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="bm25-size">-</div>
                        <div class="stat-label">BM25 Corpus</div>
                    </div>
                </div>
                <button class="secondary" id="refresh-stats-btn" style="width: 100%; margin-top: 16px;">Refresh Stats</button>
            </div>

            <div class="card">
                <h2>Admin</h2>
                <div id="admin-message"></div>
                
                <div class="action-row">
                    <input type="number" id="forget-days" placeholder="Days" min="1" value="30">
                    <button id="forget-btn" class="secondary">Forget Old</button>
                </div>
                
                <div class="action-row">
                    <input type="text" id="delete-id" placeholder="Doc ID">
                    <button id="delete-btn" class="danger">Delete</button>
                </div>
                
                <div class="actions" style="margin-top: 16px;">
                    <button id="backup-btn" class="secondary" style="flex: 1;">Create Backup</button>
                    <button id="rebuild-btn" class="secondary" style="flex: 1;">Rebuild Index</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadStats() {
            try {
                const res = await fetch('/api/stats');
                const stats = await res.json();
                document.getElementById('total-docs').textContent = stats.total_documents;
                document.getElementById('total-groups').textContent = stats.total_groups;
                document.getElementById('faiss-size').textContent = stats.faiss_index_size;
                document.getElementById('bm25-size').textContent = stats.bm25_corpus_size;
            } catch (e) {
                console.error('Failed to load stats:', e);
            }
        }

        function showMessage(el, text, type = 'success') {
            el.innerHTML = `<div class="message ${type}">${text}</div>`;
            setTimeout(() => el.innerHTML = '', 5000);
        }

        async function search() {
            const query = document.getElementById('search-query').value;
            if (!query.trim()) return;
            
            const btn = document.getElementById('search-btn');
            const originalText = btn.textContent;
            btn.innerHTML = '<span class="loading"></span>Searching...';
            btn.disabled = true;
            
            try {
                const res = await fetch('/api/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query, top_k: 5 })
                });
                const data = await res.json();
                
                const container = document.getElementById('search-results');
                if (!data.results.length) {
                    container.innerHTML = '<div class="result-item"><div class="result-content">No results found</div></div>';
                } else {
                    container.innerHTML = data.results.map(doc => `
                        <div class="result-item">
                            <div class="result-header">
                                <span class="result-id">${doc.id}</span>
                                <span class="result-meta">${doc.topic} | ${doc.created_at}</span>
                            </div>
                            <div class="result-content">${doc.content}</div>
                        </div>
                    `).join('');
                }
            } catch (e) {
                showMessage(document.getElementById('search-message'), 'Search failed', 'error');
                console.error(e);
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }

        async function forgetOld() {
            const days = document.getElementById('forget-days').value;
            try {
                const res = await fetch('/api/forget', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ days: days ? parseInt(days) : null })
                });
                const data = await res.json();
                showMessage(document.getElementById('admin-message'), `Forgot ${data.deleted_count} old documents`);
                loadStats();
            } catch (e) {
                showMessage(document.getElementById('admin-message'), 'Forget failed', 'error');
            }
        }

        async function deleteDoc() {
            const docId = document.getElementById('delete-id').value;
            if (!docId.trim()) return;
            try {
                const res = await fetch('/api/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ doc_id: docId })
                });
                showMessage(document.getElementById('admin-message'), 'Document deleted');
                document.getElementById('delete-id').value = '';
                loadStats();
            } catch (e) {
                showMessage(document.getElementById('admin-message'), 'Delete failed', 'error');
            }
        }

        async function createBackup() {
            try {
                const res = await fetch('/api/backup', { method: 'POST' });
                const data = await res.json();
                showMessage(document.getElementById('admin-message'), `Backup created: ${data.backup_path}`);
            } catch (e) {
                showMessage(document.getElementById('admin-message'), 'Backup failed', 'error');
            }
        }

        async function rebuildIndex() {
            try {
                const res = await fetch('/api/rebuild', { method: 'POST' });
                showMessage(document.getElementById('admin-message'), 'Index rebuilt');
                loadStats();
            } catch (e) {
                showMessage(document.getElementById('admin-message'), 'Rebuild failed', 'error');
            }
        }

        document.getElementById('search-btn').addEventListener('click', search);
        document.getElementById('search-query').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') search();
        });
        document.getElementById('refresh-stats-btn').addEventListener('click', loadStats);
        document.getElementById('forget-btn').addEventListener('click', forgetOld);
        document.getElementById('delete-btn').addEventListener('click', deleteDoc);
        document.getElementById('backup-btn').addEventListener('click', createBackup);
        document.getElementById('rebuild-btn').addEventListener('click', rebuildIndex);

        loadStats();
    </script>
</body>
</html>
